name: Live Object Counting Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours (LIVE MODE)

permissions:
  contents: write

jobs:
  update-radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest papers
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: Build LIVE radar dashboard
        run: python scripts/build_dashboard.py

      - name: Commit live updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data README.md
          git commit -m "live radar update" || echo "no changes"
          git push
