name: Update object-counting papers

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 09:30 Asia/Shanghai time, i.e. 01:30 UTC.
    - cron: '30 1 * * *'

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch papers and update README
        env:
          # Add this in Settings -> Secrets and variables -> Actions.
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          python scripts/fetch_papers.py

      - name: Commit automated updates
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No paper updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/papers.json data/papers.csv data/latest.md data/paper_digest.md
          git commit -m "chore: update object-counting papers"
          git push
